name: Compile ESP8266 Firmware
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP8266 Core Platform
        run: |
          arduino-cli core update-index
          arduino-cli core update-index --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Required Display & Graphics Libraries
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit BusIO"

      - name: Compile and Build Binary
        run: |
          mkdir -p build_output
                    arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 --output-dir ./build_output *.ino


      - name: Upload Finished Machine Binary
        uses: actions/upload-artifact@v4
        with:
          name: desk-dashboard-firmware
          path: build_output/*.bin
